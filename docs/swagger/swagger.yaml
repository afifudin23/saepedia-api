basePath: /api/v1
definitions:
  dto.AddItemRequest:
    properties:
      product_id:
        type: string
      quantity:
        type: integer
    required:
    - product_id
    - quantity
    type: object
  dto.CheckoutRequest:
    properties:
      address_id:
        type: string
      delivery_method:
        enum:
        - instant
        - next_day
        - regular
        type: string
      discount_code:
        maxLength: 50
        type: string
    required:
    - address_id
    - delivery_method
    type: object
  dto.CreateProductRequest:
    properties:
      description:
        maxLength: 2000
        type: string
      image_url:
        maxLength: 500
        type: string
      name:
        maxLength: 200
        minLength: 1
        type: string
      price:
        minimum: 0
        type: integer
      stock:
        minimum: 0
        type: integer
    required:
    - name
    - price
    type: object
  dto.CreateReviewRequest:
    properties:
      comment:
        maxLength: 1000
        minLength: 1
        type: string
      rating:
        maximum: 5
        minimum: 1
        type: integer
      reviewer_name:
        maxLength: 100
        minLength: 1
        type: string
    required:
    - comment
    - rating
    - reviewer_name
    type: object
  dto.GenerateRequest:
    properties:
      code:
        maxLength: 50
        minLength: 3
        type: string
      discount_type:
        enum:
        - percent
        - fixed
        type: string
      discount_value:
        type: integer
      expires_at:
        description: RFC3339, mis. 2026-12-31T23:59:59Z
        type: string
      max_discount:
        minimum: 0
        type: integer
      min_spend:
        minimum: 0
        type: integer
      usage_limit:
        type: integer
    required:
    - code
    - discount_type
    - discount_value
    - expires_at
    type: object
  dto.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  dto.PreviewRequest:
    properties:
      delivery_method:
        enum:
        - instant
        - next_day
        - regular
        type: string
      discount_code:
        maxLength: 50
        type: string
    required:
    - delivery_method
    type: object
  dto.RegisterRequest:
    properties:
      confirm_password:
        type: string
      email:
        type: string
      password:
        minLength: 6
        type: string
      roles:
        description: 'Roles: pilih satu atau lebih dari buyer/seller/driver. Default
          buyer bila kosong.'
        items:
          type: string
        type: array
    required:
    - confirm_password
    - email
    - password
    type: object
  dto.SelectRoleRequest:
    properties:
      role:
        enum:
        - admin
        - buyer
        - seller
        - driver
        type: string
    required:
    - role
    type: object
  dto.TopUpRequest:
    properties:
      amount:
        type: integer
    required:
    - amount
    type: object
  dto.UpdateItemRequest:
    properties:
      quantity:
        type: integer
    required:
    - quantity
    type: object
  dto.UpdateProductRequest:
    properties:
      description:
        maxLength: 2000
        type: string
      image_url:
        maxLength: 500
        type: string
      name:
        maxLength: 200
        minLength: 1
        type: string
      price:
        minimum: 0
        type: integer
      stock:
        minimum: 0
        type: integer
    required:
    - name
    - price
    type: object
  dto.UpsertAddressRequest:
    properties:
      full_address:
        maxLength: 500
        minLength: 5
        type: string
      is_primary:
        type: boolean
      phone:
        maxLength: 20
        minLength: 5
        type: string
      recipient_name:
        maxLength: 100
        minLength: 1
        type: string
    required:
    - full_address
    - phone
    - recipient_name
    type: object
  dto.UpsertStoreRequest:
    properties:
      description:
        maxLength: 1000
        type: string
      name:
        maxLength: 150
        minLength: 3
        type: string
    required:
    - name
    type: object
  response.ErrorCode:
    enum:
    - BAD_REQUEST
    - UNAUTHORIZED
    - FORBIDDEN
    - NOT_FOUND
    - CONFLICT
    - UNPROCESSABLE_ENTITY
    - INTERNAL_SERVER_ERROR
    - VALIDATION_ERROR
    - TOKEN_EXPIRED
    - TOKEN_INVALID
    type: string
    x-enum-varnames:
    - ErrCodeBadRequest
    - ErrCodeUnauthorized
    - ErrCodeForbidden
    - ErrCodeNotFound
    - ErrCodeConflict
    - ErrCodeUnprocessable
    - ErrCodeInternalServerError
    - ErrCodeValidation
    - ErrCodeTokenExpired
    - ErrCodeTokenInvalid
  response.Pagination:
    properties:
      page:
        type: integer
      per_page:
        type: integer
      total:
        type: integer
      total_pages:
        type: integer
    type: object
  response.Response:
    properties:
      data: {}
      error: {}
      error_code:
        $ref: '#/definitions/response.ErrorCode'
      list_data: {}
      message:
        type: string
      pagination:
        $ref: '#/definitions/response.Pagination'
      status:
        type: boolean
    type: object
info:
  contact:
    name: SEAPEDIA Dev
  description: |-
    Backend API marketplace multi-role (Admin, Seller, Buyer, Driver) — COMPFEST 18.
    Versi yang tampil di UI diambil dari config.Version (di-set saat runtime).
    Login pakai email. Otorisasi mengikuti ACTIVE ROLE pada JWT (pilih via /auth/select-role).
  termsOfService: http://swagger.io/terms/
  title: SEAPEDIA API
  version: "1.0"
